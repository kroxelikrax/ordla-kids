# Build the site and deploy it to GitHub Pages directly from master.
# Uses GitHub's official Pages deployment (no gh-pages branch): the live page
# always mirrors master, and nothing else is published.

name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch.
  push:
    branches: [master]
  # Allow running the workflow manually from the Actions tab.
  workflow_dispatch:

# Permissions needed by the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build-ci # tsc && vite build --base=/ordla-kids/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
